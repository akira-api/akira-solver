services:
  solver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: akira-solver
    restart: unless-stopped
    env_file:
      - .env
    environment:
      BROWSER_HEADLESS: "false"
    cap_add:
      - SYS_ADMIN
    shm_size: "1gb"
    security_opt:
      - seccomp:./chrome-seccomp.json
    expose:
      - "8000"
    networks:
      - akira-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: solver-cloudflared
    depends_on:
      - solver
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    networks:
      - akira-net

networks:
  akira-net:
    driver: bridge
